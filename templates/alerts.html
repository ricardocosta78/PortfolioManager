<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alertas de Preço</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <style>
      .container { width: 90%; margin: 30px auto; }

      /* Formulário */
      .form-card {
        background: #fff; border-radius: 10px;
        padding: 24px 28px; box-shadow: 0 2px 8px rgba(0,0,0,.08);
        margin-bottom: 28px;
      }
      .form-card h2 { margin: 0 0 18px; font-size: 16px; color: #2c3e50;
        border-bottom: 2px solid #3498db; padding-bottom: 8px; }
      .form-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
      .form-group { display: flex; flex-direction: column; gap: 5px; }
      .form-group label { font-size: 12px; color: #7f8c8d; text-transform: uppercase; font-weight: bold; }
      .form-group input, .form-group select {
        padding: 9px 13px; border: 1px solid #ddd; border-radius: 6px;
        font-size: 14px; min-width: 140px;
      }
      .form-group input:focus, .form-group select:focus {
        outline: none; border-color: #3498db;
      }
      .btn-add { padding: 9px 22px; font-size: 14px; border-radius: 6px;
        background: #3498db; color: #fff; border: none; cursor: pointer; width: auto; }
      .btn-add:hover { background: #2980b9; }

      /* Painéis */
      .panel { background: #fff; border-radius: 10px;
        padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.08); margin-bottom: 24px; }
      .panel h2 { margin: 0 0 16px; font-size: 16px; color: #2c3e50;
        border-bottom: 2px solid #3498db; padding-bottom: 8px; }

      /* Tabela */
      table { width: 100%; border-collapse: collapse; font-size: 14px; }
      th { text-align: left; padding: 10px 12px;
        background: #2c3e50; color: #fff; font-size: 12px; text-transform: uppercase; }
      td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; }
      tr:last-child td { border-bottom: none; }
      tr:hover td { background: #f8f9fa; }

      .badge { display: inline-block; padding: 3px 10px;
        border-radius: 12px; font-size: 12px; font-weight: bold; }
      .badge.above { background: #d5f5e3; color: #1e8449; }
      .badge.below { background: #fadbd8; color: #922b21; }
      .badge.active { background: #d6eaf8; color: #1a5276; }
      .badge.triggered { background: #fdebd0; color: #784212; }

      .btn-del { background: none; border: none; color: #e74c3c;
        cursor: pointer; font-size: 16px; padding: 0; width: auto; }
      .btn-del:hover { color: #922b21; background: none; }

      .empty { text-align: center; color: #aaa; padding: 40px; }

      /* Notificação topo */
      #alertBanner {
        display: none; background: #f39c12; color: #fff;
        padding: 14px 20px; border-radius: 8px; margin-bottom: 20px;
        font-weight: bold; font-size: 15px;
      }
      #alertBanner ul { margin: 8px 0 0 18px; font-weight: normal; font-size: 14px; }

      @media (max-width: 700px) {
        table { font-size: 12px; }
        th, td { padding: 8px; }
      }
    </style>
  </head>
  <body>
    <nav class="main-nav">
      <ul>
        <li><a href="{{ url_for('index') }}">Home</a></li>
        <li><a href="{{ url_for('portfolio') }}">Portfolio</a></li>
        <li><a href="{{ url_for('stock_analysis') }}">Stock Analysis</a></li>
        <li><a href="{{ url_for('dcf') }}">Valor Intrínseco</a></li>
        <li><a href="{{ url_for('transactions') }}">Histórico</a></li>
        <li><a href="{{ url_for('alerts') }}">Alertas</a></li>
      </ul>
    </nav>

    <div class="container">
      <h1>Alertas de Preço</h1>

      <!-- Banner de alertas disparados -->
      <div id="alertBanner"></div>

      <!-- Formulário -->
      <div class="form-card">
        <h2>Novo Alerta</h2>
        <div class="form-row">
          <div class="form-group">
            <label>Ticker</label>
            <input type="text" id="alertSymbol" placeholder="ex: AAPL" maxlength="10" />
          </div>
          <div class="form-group">
            <label>Preço Alvo ($)</label>
            <input type="number" id="alertPrice" placeholder="ex: 200.00" step="0.01" min="0" />
          </div>
          <div class="form-group">
            <label>Condição</label>
            <select id="alertDir">
              <option value="above">Sobe acima de</option>
              <option value="below">Desce abaixo de</option>
            </select>
          </div>
          <button class="btn-add" onclick="createAlert()">Adicionar Alerta</button>
        </div>
      </div>

      <!-- Alertas Activos -->
      <div class="panel">
        <h2>Alertas Activos</h2>
        <div id="activeContainer"><div class="empty">A carregar...</div></div>
      </div>

      <!-- Alertas Disparados -->
      <div class="panel">
        <h2>Alertas Disparados</h2>
        <div id="triggeredContainer"><div class="empty">A carregar...</div></div>
      </div>
    </div>

    <script>
      function fmtPrice(v) {
        return '$' + parseFloat(v).toLocaleString('pt-PT', {minimumFractionDigits: 2, maximumFractionDigits: 2});
      }

      function loadAlerts() {
        fetch('/api/alerts')
          .then(r => r.json())
          .then(data => {
            const active    = data.filter(a => a.active);
            const triggered = data.filter(a => !a.active);
            renderTable('activeContainer',    active,    true);
            renderTable('triggeredContainer', triggered, false);
          })
          .catch(() => {
            document.getElementById('activeContainer').innerHTML    = '<div class="empty">Erro ao carregar.</div>';
            document.getElementById('triggeredContainer').innerHTML = '<div class="empty">Erro ao carregar.</div>';
          });
      }

      function renderTable(containerId, data, isActive) {
        const el = document.getElementById(containerId);
        if (!data.length) {
          el.innerHTML = '<div class="empty">Sem alertas.</div>';
          return;
        }
        const rows = data.map(a => `
          <tr>
            <td><strong>${a.symbol}</strong></td>
            <td>${fmtPrice(a.target_price)}</td>
            <td><span class="badge ${a.direction}">${a.direction === 'above' ? '↑ Acima' : '↓ Abaixo'}</span></td>
            <td><span class="badge ${a.active ? 'active' : 'triggered'}">${a.active ? 'Activo' : 'Disparado'}</span></td>
            <td>${isActive ? a.created_at : (a.triggered_at || '—')}</td>
            <td><button class="btn-del" onclick="deleteAlert(${a.id})" title="Apagar">🗑️</button></td>
          </tr>`).join('');

        el.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>Ticker</th><th>Preço Alvo</th><th>Condição</th>
                <th>Estado</th><th>${isActive ? 'Criado em' : 'Disparado em'}</th><th></th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>`;
      }

      function createAlert() {
        const symbol = document.getElementById('alertSymbol').value.trim().toUpperCase();
        const price  = parseFloat(document.getElementById('alertPrice').value);
        const dir    = document.getElementById('alertDir').value;

        if (!symbol || isNaN(price) || price <= 0) {
          alert('Preenche o ticker e um preço válido.');
          return;
        }

        fetch('/api/alerts', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({symbol, target_price: price, direction: dir})
        })
          .then(r => r.json())
          .then(data => {
            if (data.error) { alert(data.error); return; }
            document.getElementById('alertSymbol').value = '';
            document.getElementById('alertPrice').value  = '';
            loadAlerts();
          })
          .catch(() => alert('Erro ao criar alerta.'));
      }

      function deleteAlert(id) {
        if (!confirm('Apagar este alerta?')) return;
        fetch(`/api/alerts/${id}`, {method: 'DELETE'})
          .then(() => loadAlerts())
          .catch(() => alert('Erro ao apagar alerta.'));
      }

      function checkAlerts() {
        fetch('/api/alerts/check')
          .then(r => r.json())
          .then(triggered => {
            if (!triggered.length) return;
            const banner = document.getElementById('alertBanner');
            const items = triggered.map(a =>
              `<li>${a.symbol}: preço atual ${fmtPrice(a.current_price)} ${a.direction === 'above' ? 'subiu acima' : 'desceu abaixo'} de ${fmtPrice(a.target_price)}</li>`
            ).join('');
            banner.innerHTML = `Alertas Disparados!<ul>${items}</ul>`;
            banner.style.display = 'block';
            loadAlerts(); // Actualizar tabelas
          });
      }

      // Enter no campo ticker
      document.addEventListener('DOMContentLoaded', () => {
        loadAlerts();
        checkAlerts();
        document.getElementById('alertSymbol').addEventListener('keydown', e => {
          if (e.key === 'Enter') document.getElementById('alertPrice').focus();
        });
        document.getElementById('alertPrice').addEventListener('keydown', e => {
          if (e.key === 'Enter') createAlert();
        });
      });
    </script>
  </body>
</html>
