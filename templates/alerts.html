<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alertas de Preço</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <style>
      .container { width: 90%; max-width: 1100px; margin: 30px auto; }

      h1 { text-align: center; color: #2c3e50; margin-bottom: 28px; }

      /* Formulário */
      .form-card {
        background: #fff; border-radius: 12px;
        padding: 28px 32px; box-shadow: 0 2px 10px rgba(0,0,0,.08);
        margin-bottom: 28px;
      }
      .form-card h2 {
        margin: 0 0 22px; font-size: 15px; color: #2c3e50;
        text-transform: uppercase; letter-spacing: .5px;
        border-bottom: 2px solid #3498db; padding-bottom: 10px;
      }
      .form-row {
        display: grid;
        grid-template-columns: 160px 200px 220px auto;
        gap: 16px;
        align-items: end;
      }
      .form-group {
        display: flex; flex-direction: column; gap: 6px;
      }
      .form-group label {
        font-size: 11px; color: #95a5a6;
        text-transform: uppercase; font-weight: 700; letter-spacing: .4px;
      }
      .form-group input,
      .form-group select {
        padding: 10px 14px; border: 1.5px solid #e0e0e0;
        border-radius: 7px; font-size: 14px; width: 100%;
        box-sizing: border-box; background: #fafafa;
        transition: border-color .2s, background .2s;
      }
      .form-group input:focus,
      .form-group select:focus {
        outline: none; border-color: #3498db; background: #fff;
      }
      .btn-add {
        padding: 10px 26px; font-size: 14px; font-weight: 600;
        border-radius: 7px; background: #3498db; color: #fff;
        border: none; cursor: pointer; width: auto; height: 42px;
        transition: background .2s;
      }
      .btn-add:hover { background: #2980b9; }

      /* Painéis */
      .panel {
        background: #fff; border-radius: 12px;
        padding: 22px 24px; box-shadow: 0 2px 10px rgba(0,0,0,.08);
        margin-bottom: 24px;
      }
      .panel h2 {
        margin: 0 0 18px; font-size: 15px; color: #2c3e50;
        text-transform: uppercase; letter-spacing: .5px;
        border-bottom: 2px solid #3498db; padding-bottom: 10px;
      }

      /* Tabela */
      table { width: 100%; border-collapse: collapse; font-size: 14px; }
      th {
        text-align: left; padding: 11px 14px;
        background: #2c3e50; color: #fff;
        font-size: 11px; text-transform: uppercase; letter-spacing: .4px;
      }
      th:first-child { border-radius: 6px 0 0 0; }
      th:last-child  { border-radius: 0 6px 0 0; }
      td { padding: 11px 14px; border-bottom: 1px solid #f0f0f0; color: #2c3e50; }
      tr:last-child td { border-bottom: none; }
      tr:hover td { background: #f8fafc; }

      .badge {
        display: inline-block; padding: 4px 12px;
        border-radius: 20px; font-size: 12px; font-weight: 700;
      }
      .badge.above     { background: #d5f5e3; color: #1e8449; }
      .badge.below     { background: #fadbd8; color: #922b21; }
      .badge.active    { background: #d6eaf8; color: #1a5276; }
      .badge.triggered { background: #fdebd0; color: #784212; }

      .btn-del {
        background: none; border: none; color: #e74c3c;
        cursor: pointer; font-size: 17px; padding: 0; width: auto;
        transition: color .2s;
      }
      .btn-del:hover { color: #922b21; background: none; }

      .empty {
        text-align: center; color: #bdc3c7;
        padding: 40px 20px; font-size: 14px;
      }

      /* Banner */
      #alertBanner {
        display: none; background: #e67e22; color: #fff;
        padding: 14px 20px; border-radius: 10px; margin-bottom: 22px;
        font-weight: 700; font-size: 15px;
        box-shadow: 0 3px 10px rgba(230,126,34,.3);
      }
      #alertBanner ul { margin: 8px 0 0 20px; font-weight: 400; font-size: 14px; line-height: 1.7; }

      @media (max-width: 800px) {
        .form-row { grid-template-columns: 1fr 1fr; }
        .btn-add   { grid-column: span 2; }
        table { font-size: 12px; }
        th, td { padding: 8px 10px; }
      }
      @media (max-width: 480px) {
        .form-row { grid-template-columns: 1fr; }
        .btn-add   { grid-column: span 1; }
      }
    </style>
  </head>
  <body>
    <nav class="main-nav">
      <ul>
        <li><a href="{{ url_for('index') }}">Home</a></li>
        <li><a href="{{ url_for('portfolio') }}">Portfolio</a></li>
        <li><a href="{{ url_for('stock_analysis') }}">Stock Analysis</a></li>
        <li><a href="{{ url_for('dcf') }}">Valor Intrínseco</a></li>
        <li><a href="{{ url_for('transactions') }}">Histórico</a></li>
        <li><a href="{{ url_for('alerts') }}">Alertas</a></li>
        <li><a href="{{ url_for('comparator') }}">Comparador</a></li>
        <li><a href="{{ url_for('chart_page') }}">Gráfico</a></li>
        <li><a href="{{ url_for('watchlist') }}">Watchlist</a></li>
      </ul>
    </nav>

    <div class="container">
      <h1>Alertas de Preço</h1>

      <!-- Banner de alertas disparados -->
      <div id="alertBanner"></div>

      <!-- Formulário -->
      <div class="form-card">
        <h2>Novo Alerta</h2>
        <div class="form-row">
          <div class="form-group">
            <label>Ticker</label>
            <input type="text" id="alertSymbol" placeholder="ex: AAPL" maxlength="10" />
          </div>
          <div class="form-group">
            <label>Preço Alvo ($)</label>
            <input type="number" id="alertPrice" placeholder="ex: 200.00" step="0.01" min="0" />
          </div>
          <div class="form-group">
            <label>Condição</label>
            <select id="alertDir">
              <option value="above">Sobe acima de</option>
              <option value="below">Desce abaixo de</option>
            </select>
          </div>
          <button class="btn-add" onclick="createAlert()">Adicionar Alerta</button>
          <a href="/export/alerts" style="padding:10px 20px;background:#27ae60;color:#fff;border-radius:7px;font-size:14px;font-weight:600;text-decoration:none;height:42px;display:flex;align-items:center;">⬇ Exportar CSV</a>
        </div>
      </div>

      <!-- Alertas Activos -->
      <div class="panel">
        <h2>Alertas Activos</h2>
        <div id="activeContainer"><div class="empty">A carregar...</div></div>
      </div>

      <!-- Alertas Disparados -->
      <div class="panel">
        <h2>Alertas Disparados</h2>
        <div id="triggeredContainer"><div class="empty">A carregar...</div></div>
      </div>
    </div>

    <script>
      function fmtPrice(v) {
        return '$' + parseFloat(v).toLocaleString('pt-PT', {minimumFractionDigits: 2, maximumFractionDigits: 2});
      }

      function loadAlerts() {
        fetch('/api/alerts')
          .then(r => r.json())
          .then(data => {
            const active    = data.filter(a => a.active);
            const triggered = data.filter(a => !a.active);
            renderTable('activeContainer',    active,    true);
            renderTable('triggeredContainer', triggered, false);
          })
          .catch(() => {
            document.getElementById('activeContainer').innerHTML    = '<div class="empty">Erro ao carregar.</div>';
            document.getElementById('triggeredContainer').innerHTML = '<div class="empty">Erro ao carregar.</div>';
          });
      }

      function renderTable(containerId, data, isActive) {
        const el = document.getElementById(containerId);
        if (!data.length) {
          el.innerHTML = '<div class="empty">Sem alertas.</div>';
          return;
        }
        const rows = data.map(a => `
          <tr>
            <td><strong>${a.symbol}</strong></td>
            <td>${fmtPrice(a.target_price)}</td>
            <td><span class="badge ${a.direction}">${a.direction === 'above' ? '↑ Acima' : '↓ Abaixo'}</span></td>
            <td><span class="badge ${a.active ? 'active' : 'triggered'}">${a.active ? 'Activo' : 'Disparado'}</span></td>
            <td>${isActive ? a.created_at : (a.triggered_at || '—')}</td>
            <td><button class="btn-del" onclick="deleteAlert(${a.id})" title="Apagar">🗑️</button></td>
          </tr>`).join('');

        el.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>Ticker</th><th>Preço Alvo</th><th>Condição</th>
                <th>Estado</th><th>${isActive ? 'Criado em' : 'Disparado em'}</th><th></th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>`;
      }

      function createAlert() {
        const symbol = document.getElementById('alertSymbol').value.trim().toUpperCase();
        const price  = parseFloat(document.getElementById('alertPrice').value);
        const dir    = document.getElementById('alertDir').value;

        if (!symbol || isNaN(price) || price <= 0) {
          alert('Preenche o ticker e um preço válido.');
          return;
        }

        fetch('/api/alerts', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({symbol, target_price: price, direction: dir})
        })
          .then(r => r.json())
          .then(data => {
            if (data.error) { alert(data.error); return; }
            document.getElementById('alertSymbol').value = '';
            document.getElementById('alertPrice').value  = '';
            loadAlerts();
          })
          .catch(() => alert('Erro ao criar alerta.'));
      }

      function deleteAlert(id) {
        if (!confirm('Apagar este alerta?')) return;
        fetch(`/api/alerts/${id}`, {method: 'DELETE'})
          .then(() => loadAlerts())
          .catch(() => alert('Erro ao apagar alerta.'));
      }

      function checkAlerts() {
        fetch('/api/alerts/check')
          .then(r => r.json())
          .then(triggered => {
            if (!triggered.length) return;
            const banner = document.getElementById('alertBanner');
            const items = triggered.map(a =>
              `<li>${a.symbol}: preço atual ${fmtPrice(a.current_price)} ${a.direction === 'above' ? 'subiu acima' : 'desceu abaixo'} de ${fmtPrice(a.target_price)}</li>`
            ).join('');
            banner.innerHTML = `Alertas Disparados!<ul>${items}</ul>`;
            banner.style.display = 'block';
            loadAlerts(); // Actualizar tabelas
          });
      }

      // Enter no campo ticker
      document.addEventListener('DOMContentLoaded', () => {
        loadAlerts();
        checkAlerts();
        document.getElementById('alertSymbol').addEventListener('keydown', e => {
          if (e.key === 'Enter') document.getElementById('alertPrice').focus();
        });
        document.getElementById('alertPrice').addEventListener('keydown', e => {
          if (e.key === 'Enter') createAlert();
        });
      });
    </script>
  </body>
</html>
