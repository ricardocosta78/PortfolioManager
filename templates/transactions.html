<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Histórico de Transações</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <style>
      .container { width: 90%; margin: 30px auto; }

      .toolbar {
        display: flex; align-items: center; gap: 12px;
        margin-bottom: 20px; flex-wrap: wrap;
      }
      .toolbar input {
        padding: 8px 12px; border: 1px solid #ddd;
        border-radius: 6px; font-size: 14px; width: 180px;
      }
      .toolbar button {
        padding: 8px 16px; font-size: 14px;
        border-radius: 6px; width: auto;
      }
      .btn-clear { background: #e74c3c; }
      .btn-clear:hover { background: #c0392b; }

      /* Resumo */
      .summary {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px; margin-bottom: 24px;
      }
      .sum-card {
        background: #fff; border-radius: 10px;
        padding: 16px 18px; box-shadow: 0 2px 8px rgba(0,0,0,.08);
        border-top: 4px solid #3498db;
      }
      .sum-card.green { border-top-color: #27ae60; }
      .sum-card.red   { border-top-color: #e74c3c; }
      .sum-card.orange{ border-top-color: #e67e22; }
      .sum-label { font-size: 12px; color: #7f8c8d; text-transform: uppercase; margin-bottom: 4px; }
      .sum-value { font-size: 22px; font-weight: bold; color: #2c3e50; }
      .sum-value.pos { color: #27ae60; }
      .sum-value.neg { color: #e74c3c; }

      /* Tabela */
      .panel { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
      .panel h2 { margin: 0 0 16px; font-size: 16px; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 8px; }

      table { width: 100%; border-collapse: collapse; font-size: 14px; }
      th {
        text-align: left; padding: 10px 12px;
        background: #2c3e50; color: #fff;
        font-size: 12px; text-transform: uppercase;
      }
      td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; }
      tr:last-child td { border-bottom: none; }
      tr:hover td { background: #f8f9fa; }

      .badge {
        display: inline-block; padding: 3px 10px;
        border-radius: 12px; font-size: 12px; font-weight: bold;
      }
      .badge.compra { background: #d5f5e3; color: #1e8449; }
      .badge.venda  { background: #fadbd8; color: #922b21; }

      .btn-del {
        background: none; border: none; color: #e74c3c;
        cursor: pointer; font-size: 16px; padding: 0;
        width: auto;
      }
      .btn-del:hover { color: #922b21; background: none; }

      .empty { text-align: center; color: #aaa; padding: 40px; }

      @media (max-width: 700px) {
        .summary { grid-template-columns: repeat(2,1fr); }
        table { font-size: 12px; }
        th, td { padding: 8px; }
      }
    </style>
  </head>
  <body>
    <nav class="main-nav">
      <ul>
        <li><a href="{{ url_for('index') }}">Home</a></li>
        <li><a href="{{ url_for('portfolio') }}">Portfolio</a></li>
        <li><a href="{{ url_for('stock_analysis') }}">Stock Analysis</a></li>
        <li><a href="{{ url_for('dcf') }}">Valor Intrínseco</a></li>
        <li><a href="{{ url_for('transactions') }}">Histórico</a></li>
        <li><a href="{{ url_for('alerts') }}">Alertas</a></li>
        <li><a href="{{ url_for('comparator') }}">Comparador</a></li>
        <li><a href="{{ url_for('chart_page') }}">Gráfico</a></li>
        <li><a href="{{ url_for('watchlist') }}">Watchlist</a></li>
      </ul>
    </nav>

    <div class="container">
      <h1>Histórico de Transações</h1>

      <!-- Filtro -->
      <div class="toolbar">
        <input type="text" id="filterSymbol" placeholder="Filtrar por ticker..." />
        <button onclick="loadTransactions()">Filtrar</button>
        <button onclick="clearFilter()">Limpar</button>
        <a id="exportBtn" href="/export/transactions" style="margin-left:auto;padding:8px 18px;background:#27ae60;color:#fff;border-radius:6px;font-size:14px;font-weight:600;text-decoration:none;">⬇ Exportar CSV</a>
      </div>

      <!-- Resumo -->
      <div class="summary">
        <div class="sum-card">
          <div class="sum-label">Total Transações</div>
          <div class="sum-value" id="sumTotal">—</div>
        </div>
        <div class="sum-card green">
          <div class="sum-label">Total Compras</div>
          <div class="sum-value pos" id="sumCompras">—</div>
        </div>
        <div class="sum-card red">
          <div class="sum-label">Total Vendas</div>
          <div class="sum-value neg" id="sumVendas">—</div>
        </div>
        <div class="sum-card orange">
          <div class="sum-label">Tickers Únicos</div>
          <div class="sum-value" id="sumTickers">—</div>
        </div>
      </div>

      <!-- Tabela -->
      <div class="panel">
        <h2>Transações</h2>
        <div id="tableContainer"><div class="empty">A carregar...</div></div>
      </div>
    </div>

    <script>
      function fmt(val) {
        return '$' + parseFloat(val).toLocaleString('pt-PT', {minimumFractionDigits: 2, maximumFractionDigits: 2});
      }

      function loadTransactions() {
        const symbol = document.getElementById('filterSymbol').value.trim().toUpperCase();
        const url = symbol ? `/api/transactions?symbol=${symbol}` : '/api/transactions';
        // Atualizar link de exportar com o filtro atual
        const exportUrl = symbol ? `/export/transactions?symbol=${symbol}` : '/export/transactions';
        document.getElementById('exportBtn').href = exportUrl;

        fetch(url)
          .then(r => r.json())
          .then(data => {
            renderSummary(data);
            renderTable(data);
          })
          .catch(() => {
            document.getElementById('tableContainer').innerHTML =
              '<div class="empty">Erro ao carregar transações.</div>';
          });
      }

      function renderSummary(data) {
        const compras = data.filter(t => t.action === 'compra');
        const vendas  = data.filter(t => t.action === 'venda');
        const tickers = new Set(data.map(t => t.symbol)).size;

        document.getElementById('sumTotal').textContent   = data.length;
        document.getElementById('sumCompras').textContent = fmt(compras.reduce((s,t) => s + t.total, 0));
        document.getElementById('sumVendas').textContent  = fmt(vendas.reduce((s,t) => s + t.total, 0));
        document.getElementById('sumTickers').textContent = tickers;
      }

      function renderTable(data) {
        if (!data.length) {
          document.getElementById('tableContainer').innerHTML =
            '<div class="empty">Sem transações registadas.</div>';
          return;
        }

        const rows = data.map(t => `
          <tr>
            <td>${t.date}</td>
            <td><strong>${t.symbol}</strong></td>
            <td><span class="badge ${t.action}">${t.action.toUpperCase()}</span></td>
            <td>${t.quantity}</td>
            <td>${fmt(t.price)}</td>
            <td><strong>${fmt(t.total)}</strong></td>
            <td>
              <button class="btn-del" onclick="deleteTransaction(${t.id})" title="Apagar">🗑️</button>
            </td>
          </tr>`).join('');

        document.getElementById('tableContainer').innerHTML = `
          <table>
            <thead>
              <tr>
                <th>Data</th><th>Ticker</th><th>Tipo</th>
                <th>Quantidade</th><th>Preço</th><th>Total</th><th></th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>`;
      }

      function deleteTransaction(id) {
        if (!confirm('Apagar esta transação?')) return;
        fetch(`/api/transactions/${id}`, { method: 'DELETE' })
          .then(r => r.json())
          .then(() => loadTransactions())
          .catch(() => alert('Erro ao apagar transação.'));
      }

      function clearFilter() {
        document.getElementById('filterSymbol').value = '';
        loadTransactions();
      }

      // Enter no filtro
      document.addEventListener('DOMContentLoaded', () => {
        loadTransactions();
        document.getElementById('filterSymbol').addEventListener('keydown', e => {
          if (e.key === 'Enter') loadTransactions();
        });
      });
    </script>
  </body>
</html>
