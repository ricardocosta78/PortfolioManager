<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerenciador de Portfólio</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script
      src="{{ url_for('static', filename='js/portfolio.js') }}"
      defer
    ></script>
    <script
      src="{{ url_for('static', filename='js/chart.js') }}"
      defer
    ></script>
  </head>
  <body>
    <nav class="main-nav">
      <ul>
        <li><a href="{{ url_for('index') }}">Home</a></li>
        <li><a href="{{ url_for('portfolio') }}">Portfolio</a></li>
        <li><a href="{{ url_for('stock_analysis') }}">Stock Analysis</a></li>
        <li><a href="{{ url_for('dcf') }}">Valor Intrínseco</a></li>
        <li><a href="{{ url_for('transactions') }}">Histórico</a></li>
        <li><a href="{{ url_for('alerts') }}">Alertas</a></li>
      </ul>
    </nav>

    <div class="container">
      <!-- Banner de alertas disparados -->
      <div id="alertBanner" style="display:none; background:#f39c12; color:#fff; padding:14px 20px;
           border-radius:8px; margin-bottom:20px; font-weight:bold; font-size:15px;"></div>

      <h1>Gerenciador de Portfólio</h1>

      <div class="actions">
        <button id="addStock">Adicionar Ação</button>
      </div>

      <table id="portfolioTable">
        <thead>
          <tr>
            <th>Símbolo</th>
            <th>Quantidade</th>
            <th>Preço de Compra</th>
            <th>Preço Atual</th>
            <th>Total de Compra</th>
            <th>Margem (Lucro/Perda)</th>
            <th>% Lucro/Perda</th>
            <th>% do Portfólio</th>
          </tr>
        </thead>
        <tbody>
          <!-- As linhas serão adicionadas aqui via JavaScript -->
        </tbody>
      </table>
      <!-- Adicione isso após sua tabela -->
      <div class="visualizations-container">
        <div class="chart-container">
          <canvas id="portfolioChart"></canvas>
        </div>
        <div id="heatmapContainer" class="heatmap-container">
          <!-- Os boxes do heatmap serão adicionados aqui via JavaScript -->
        </div>
      </div>
    </div>
    <script>
      // Initialize visualizations when the page loads
      document.addEventListener(
        'DOMContentLoaded',
        updatePortfolioVisualizations
      );
    </script>
  </body>
</html>
